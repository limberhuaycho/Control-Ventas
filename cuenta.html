<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Mi Cuenta</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="mobile-header">
        <h1>📦 InvenPro</h1>
        <button id="menuToggle">☰</button>
      </header>
      <nav class="mobile-nav" id="mobileNav"></nav>

      <main class="page-content">
        <div class="max-w-sm space-y">
          <h1>👤 Mi Cuenta</h1>

          <div class="card glass">
            <div class="card-header text-center">
              <div class="account-avatar" id="avatar">U</div>
              <p class="account-name" id="accountName">Usuario</p>
              <div style="display:flex;justify-content:center;gap:0.5rem;margin-top:0.5rem">
                <span class="badge badge-secondary" id="roleBadge"></span>
                <span class="badge badge-outline hidden" id="guestBadge">Invitado</span>
              </div>
            </div>
            <div class="card-content space-y-sm" id="infoList"></div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from "./js/auth.js";

    requireAuth((user, userData) => {
      // Sidebar
      const isVendedor = userData.role === "vendedor";
      const items = [
        { label: "Dashboard", path: "dashboard.html", icon: "📊", show: true },
        { label: "Subir Productos", path: "subir.html", icon: "📦", show: isVendedor },
        { label: "Ventas", path: "ventas.html", icon: "🛒", show: true },
        { label: "Control de Ventas", path: "historial.html", icon: "📈", show: isVendedor },
        { label: "Mi Cuenta", path: "cuenta.html", icon: "👤", show: true },
      ];
      document.getElementById("sidebar").innerHTML = `<div class="sidebar-header"><h1>📦 InvenPro</h1><p>Sistema de Inventario</p></div><nav class="sidebar-nav">${items.filter(i=>i.show).map(i=>`<button class="nav-btn ${i.path==='cuenta.html'?'active':''}" onclick="location.href='${i.path}'">${i.icon} ${i.label}</button>`).join("")}</nav><div class="sidebar-footer"><button class="nav-btn" style="color:var(--destructive)" id="logoutBtn">🚪 Cerrar sesión</button></div>`;
      document.getElementById("mobileNav").innerHTML = items.filter(i=>i.show).map(i=>`<button class="mobile-nav-btn ${i.path==='cuenta.html'?'active':''}" onclick="location.href='${i.path}'">${i.icon} ${i.label}</button>`).join("")+`<button class="mobile-nav-btn logout-btn" id="logoutBtnMobile">🚪 Cerrar sesión</button>`;
      document.getElementById("menuToggle")?.addEventListener("click",()=>document.getElementById("mobileNav").classList.toggle("open"));
      document.getElementById("logoutBtn")?.addEventListener("click",logout);
      document.getElementById("logoutBtnMobile")?.addEventListener("click",logout);

      // Account info
      document.getElementById("avatar").textContent = (userData.displayName || "U")[0].toUpperCase();
      document.getElementById("accountName").textContent = userData.displayName || "Usuario";
      document.getElementById("roleBadge").textContent = userData.role || "N/A";
      if (userData.isAnonymous) document.getElementById("guestBadge").classList.remove("hidden");

      const info = [
        { label: "Nombre", value: userData.displayName || "Sin nombre", icon: "👤" },
        { label: "Email", value: userData.email || "Sin email (Invitado)", icon: "✉️" },
        { label: "Rol", value: userData.role || "N/A", icon: "🛡️" },
        { label: "UID", value: (userData.uid || "").slice(0, 12) + "...", icon: "🕐" },
      ];
      document.getElementById("infoList").innerHTML = info.map(i => `
        <div class="account-info-row">
          <span>${i.icon}</span>
          <div>
            <p class="info-label">${i.label}</p>
            <p class="info-value">${i.value}</p>
          </div>
        </div>
      `).join("");
    });
  </script>
</body>
</html>

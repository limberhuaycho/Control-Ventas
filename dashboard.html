<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar"></aside>

    <div class="main-area">
      <!-- Mobile header -->
      <header class="mobile-header">
        <h1>📦 InvenPro</h1>
        <button id="menuToggle">☰</button>
      </header>
      <nav class="mobile-nav" id="mobileNav"></nav>

      <!-- Content -->
      <main class="page-content">
        <div class="max-w-container space-y">
          <!-- Welcome -->
          <div class="welcome">
            <h1>Hola, <span id="userName">Usuario</span> 👋</h1>
            <p>Rol: <span class="role" id="userRole">-</span> <span id="guestBadge"></span></p>
          </div>

          <!-- Status -->
          <div class="card glass">
            <div class="status-card">
              <span>🕐</span>
              <div style="flex:1">
                <p style="font-size:0.875rem;font-weight:500" id="statusMsg"></p>
                <p style="font-size:0.75rem;color:var(--muted-fg)">Hora Bolivia: <span id="timeDisplay"></span></p>
              </div>
              <div class="status-dot" id="statusDot"></div>
            </div>
          </div>

          <!-- Actions -->
          <div class="action-grid" id="actionGrid"></div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from "./js/auth.js";
    import { getBoliviaTimeString, isWithinSalesHours, getSalesStatusMessage } from "./js/app.js";

    function buildSidebar(userData, currentPage) {
      const isVendedor = userData?.role === "vendedor";
      const items = [
        { label: "Dashboard", path: "dashboard.html", icon: "📊", show: true },
        { label: "Subir Productos", path: "subir.html", icon: "📦", show: isVendedor },
        { label: "Ventas", path: "ventas.html", icon: "🛒", show: true },
        { label: "Control de Ventas", path: "historial.html", icon: "📈", show: isVendedor },
        { label: "Mi Cuenta", path: "cuenta.html", icon: "👤", show: true },
      ];

      // Desktop sidebar
      const sidebar = document.getElementById("sidebar");
      sidebar.innerHTML = `
        <div class="sidebar-header">
          <h1>📦 InvenPro</h1>
          <p>Sistema de Inventario</p>
        </div>
        <nav class="sidebar-nav">
          ${items.filter(i=>i.show).map(i => `
            <button class="nav-btn ${currentPage === i.path ? 'active' : ''}" onclick="location.href='${i.path}'">
              ${i.icon} ${i.label}
            </button>
          `).join("")}
        </nav>
        <div class="sidebar-footer">
          <div class="sidebar-user">
            <div class="sidebar-avatar">${(userData?.displayName||"U")[0].toUpperCase()}</div>
            <div class="sidebar-user-info">
              <p>${userData?.displayName || "Usuario"}</p>
              <span>${userData?.role || ""}</span>
            </div>
          </div>
          <button class="nav-btn" id="logoutBtn" style="color:var(--destructive)">🚪 Cerrar sesión</button>
        </div>
      `;

      // Mobile nav
      const mobileNav = document.getElementById("mobileNav");
      mobileNav.innerHTML = items.filter(i=>i.show).map(i => `
        <button class="mobile-nav-btn ${currentPage === i.path ? 'active' : ''}" onclick="location.href='${i.path}'">
          ${i.icon} ${i.label}
        </button>
      `).join("") + `<button class="mobile-nav-btn logout-btn" id="logoutBtnMobile">🚪 Cerrar sesión</button>`;

      document.getElementById("menuToggle")?.addEventListener("click", () => {
        mobileNav.classList.toggle("open");
      });

      document.getElementById("logoutBtn")?.addEventListener("click", logout);
      document.getElementById("logoutBtnMobile")?.addEventListener("click", logout);
    }

    // Make buildSidebar available globally for other pages
    window.buildSidebar = buildSidebar;

    requireAuth((user, userData) => {
      buildSidebar(userData, "dashboard.html");

      document.getElementById("userName").textContent = userData.displayName || "Usuario";
      document.getElementById("userRole").textContent = userData.role || "-";
      if (userData.isAnonymous) document.getElementById("guestBadge").textContent = "(Invitado)";

      // Time
      const updateTime = () => {
        document.getElementById("timeDisplay").textContent = getBoliviaTimeString();
        document.getElementById("statusMsg").textContent = getSalesStatusMessage();
        const dot = document.getElementById("statusDot");
        dot.className = isWithinSalesHours() ? "status-dot active" : "status-dot inactive";
      };
      updateTime();
      setInterval(updateTime, 30000);

      // Actions
      const isVendedor = userData.role === "vendedor";
      const actions = [
        { label: "Subir Productos", sub: "Ir a subir productos", path: "subir.html", icon: "📦", cls: "primary", show: isVendedor },
        { label: "Ventas", sub: "Ir a ventas", path: "ventas.html", icon: "🛒", cls: "accent", show: true },
        { label: "Control de Ventas", sub: "Ir a control de ventas", path: "historial.html", icon: "📈", cls: "warning", show: isVendedor },
        { label: "Mi Cuenta", sub: "Ir a mi cuenta", path: "cuenta.html", icon: "👤", cls: "secondary", show: true },
      ];

      document.getElementById("actionGrid").innerHTML = actions.filter(a=>a.show).map(a => `
        <div class="card glass action-card" onclick="location.href='${a.path}'">
          <div class="action-card-inner">
            <div class="action-icon ${a.cls}">${a.icon}</div>
            <div>
              <p class="label">${a.label}</p>
              <p class="sublabel">${a.sub}</p>
            </div>
          </div>
        </div>
      `).join("");
    });
  </script>
</body>
</html>

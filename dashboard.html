<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Dashboard</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>📦 InvenPro</h1>
        <p>Sistema de Inventario</p>
      </div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user"></div>
        <button class="btn btn-ghost btn-full" id="logout-btn" style="justify-content:flex-start;color:rgba(255,255,255,0.5)">🚪 Cerrar sesión</button>
      </div>
    </aside>

    <!-- Main -->
    <div class="main-content">
      <!-- Mobile header -->
      <div class="mobile-header">
        <h1>📦 InvenPro</h1>
        <button class="hamburger" id="hamburger">☰</button>
      </div>
      <div class="mobile-nav" id="mobile-nav"></div>

      <div class="page-content">
        <div class="container-lg space-y">
          <!-- Welcome -->
          <div>
            <h1 class="page-title" id="welcome-title">Hola 👋</h1>
            <p style="color:var(--muted-fg)" id="user-role-text"></p>
          </div>

          <!-- Status -->
          <div class="card">
            <div class="status-bar">
              <span style="color:var(--muted-fg)">⏰</span>
              <div style="flex:1">
                <p style="font-size:0.875rem;font-weight:500" id="status-text"></p>
                <p style="font-size:0.75rem;color:var(--muted-fg)" id="status-time-text"></p>
              </div>
              <div class="status-dot" id="status-dot-main"></div>
            </div>
          </div>

          <!-- Action cards -->
          <div class="action-grid" id="action-grid"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    checkAuth((user, userData) => {
      if (!userData) return;
      setupSidebar(userData, "dashboard.html");

      document.getElementById("welcome-title").textContent = `Hola, ${userData.displayName || "Usuario"} 👋`;
      document.getElementById("user-role-text").innerHTML =
        `Rol: <strong style="color:var(--fg);text-transform:capitalize">${userData.role}</strong>${userData.isAnonymous ? " (Invitado)" : ""}`;

      // Status
      const active = isWithinSalesHours();
      document.getElementById("status-text").textContent = getSalesStatusMessage();
      document.getElementById("status-time-text").textContent = "Hora Bolivia: " + getBoliviaTimeString();
      document.getElementById("status-dot-main").className = "status-dot " + (active ? "active" : "inactive");

      // Actions
      const isVendedor = userData.role === "vendedor";
      const actions = [
        { label: "Subir Productos", desc: "Ir a subir productos", icon: "📦", color: "action-icon-green", path: "subir.html", show: isVendedor },
        { label: "Ventas", desc: "Ir a ventas", icon: "🛒", color: "action-icon-blue", path: "ventas.html", show: true },
        { label: "Control de Ventas", desc: "Ir a control de ventas", icon: "📈", color: "action-icon-yellow", path: "historial.html", show: isVendedor },
        { label: "Mi Cuenta", desc: "Ir a mi cuenta", icon: "👤", color: "action-icon-gray", path: "cuenta.html", show: true }
      ];

      document.getElementById("action-grid").innerHTML = actions.filter(a => a.show).map(a => `
        <div class="card action-card" onclick="window.location.href='${a.path}'">
          <div class="action-icon ${a.color}">${a.icon}</div>
          <div>
            <p>${a.label}</p>
            <p>${a.desc}</p>
          </div>
        </div>
      `).join("");

      setInterval(() => {
        const a = isWithinSalesHours();
        document.getElementById("status-text").textContent = getSalesStatusMessage();
        document.getElementById("status-time-text").textContent = "Hora Bolivia: " + getBoliviaTimeString();
        document.getElementById("status-dot-main").className = "status-dot " + (a ? "active" : "inactive");
      }, 30000);
    });
  </script>
</body>
</html>

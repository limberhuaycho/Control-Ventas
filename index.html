<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Iniciar Sesión</title>
  <meta name="description" content="Sistema de inventario y control de ventas en tiempo real con Firebase">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="login-page">
    <div class="login-bg-1"></div>
    <div class="login-bg-2"></div>

    <div class="login-card glass card">
      <div class="card-header">
        <div class="login-logo">📦</div>
        <h2 class="login-title">InvenPro</h2>
        <p class="login-subtitle" id="subtitle">Inicia sesión en tu cuenta</p>
      </div>
      <div class="card-content">
        <form id="loginForm" class="space-y-sm">
          <!-- Nombre (solo registro) -->
          <div class="form-group hidden" id="nameGroup">
            <label for="name">Nombre completo</label>
            <div class="input-icon-wrapper">
              <span class="icon">👤</span>
              <input type="text" id="name" class="input" placeholder="Tu nombre" maxlength="100">
            </div>
          </div>

          <!-- Email -->
          <div class="form-group">
            <label for="email">Email</label>
            <div class="input-icon-wrapper">
              <span class="icon">✉️</span>
              <input type="email" id="email" class="input" placeholder="tu@email.com" maxlength="255">
            </div>
          </div>

          <!-- Contraseña -->
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-icon-wrapper">
              <span class="icon">🔒</span>
              <input type="password" id="password" class="input" placeholder="••••••" maxlength="128">
            </div>
          </div>

          <!-- Rol (solo registro) -->
          <div class="form-group hidden" id="roleGroup">
            <label>Tipo de cuenta</label>
            <div class="radio-group">
              <label class="radio-item">
                <input type="radio" name="role" value="vendedor" checked> Vendedor
              </label>
              <label class="radio-item">
                <input type="radio" name="role" value="comprador"> Comprador
              </label>
            </div>
          </div>

          <!-- Error -->
          <div class="alert alert-error hidden" id="errorBox">
            <span>⚠️</span>
            <span id="errorText"></span>
          </div>

          <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
            🔑 Iniciar sesión
          </button>
        </form>

        <div class="divider"><span>o continúa con</span></div>

        <div class="social-grid">
          <button class="btn btn-outline" id="googleBtn">🌐 Google</button>
          <button class="btn btn-outline" id="guestBtn">👤 Invitado</button>
        </div>

        <p class="toggle-text">
          <span id="toggleQuestion">¿No tienes cuenta?</span>
          <button id="toggleBtn">Crear cuenta</button>
        </p>
      </div>
    </div>
  </div>

  <script type="module">
    import { auth } from "./js/firebase-config.js";
    import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.8.1/firebase-auth.js";
    import { loginWithEmail, registerWithEmail, loginWithGoogle, loginAsGuest, getUserData } from "./js/auth.js";
    import { getFirebaseError } from "./js/app.js";

    // Si ya tiene sesión, ir al dashboard
    onAuthStateChanged(auth, (user) => {
      if (user) window.location.href = "dashboard.html";
    });

    let isRegister = false;
    const form = document.getElementById("loginForm");
    const nameGroup = document.getElementById("nameGroup");
    const roleGroup = document.getElementById("roleGroup");
    const errorBox = document.getElementById("errorBox");
    const errorText = document.getElementById("errorText");
    const submitBtn = document.getElementById("submitBtn");
    const subtitle = document.getElementById("subtitle");
    const toggleQuestion = document.getElementById("toggleQuestion");
    const toggleBtn = document.getElementById("toggleBtn");

    function showError(msg) {
      errorBox.classList.remove("hidden");
      errorText.textContent = msg;
    }
    function hideError() { errorBox.classList.add("hidden"); }

    function setLoading(btn, loading) {
      btn.disabled = loading;
      if (loading) btn.dataset.original = btn.innerHTML;
      btn.innerHTML = loading ? '<div class="spinner"></div>' : btn.dataset.original;
    }

    // Toggle login/registro
    toggleBtn.addEventListener("click", () => {
      isRegister = !isRegister;
      hideError();
      nameGroup.classList.toggle("hidden", !isRegister);
      roleGroup.classList.toggle("hidden", !isRegister);
      subtitle.textContent = isRegister ? "Crea tu cuenta para comenzar" : "Inicia sesión en tu cuenta";
      submitBtn.innerHTML = isRegister ? "📝 Crear cuenta" : "🔑 Iniciar sesión";
      toggleQuestion.textContent = isRegister ? "¿Ya tienes cuenta?" : "¿No tienes cuenta?";
      toggleBtn.textContent = isRegister ? "Inicia sesión" : "Crear cuenta";
    });

    // Submit
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      hideError();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      if (!email || !password) { showError("Completa todos los campos"); return; }

      setLoading(submitBtn, true);
      try {
        if (isRegister) {
          const name = document.getElementById("name").value.trim();
          if (!name) { showError("El nombre es requerido"); setLoading(submitBtn, false); return; }
          if (password.length < 6) { showError("La contraseña debe tener al menos 6 caracteres"); setLoading(submitBtn, false); return; }
          const role = document.querySelector('input[name="role"]:checked').value;
          await registerWithEmail(email, password, name, role);
        } else {
          await loginWithEmail(email, password);
        }
        window.location.href = "dashboard.html";
      } catch (err) {
        showError(getFirebaseError(err));
        setLoading(submitBtn, false);
      }
    });

    // Google
    document.getElementById("googleBtn").addEventListener("click", async () => {
      hideError();
      const btn = document.getElementById("googleBtn");
      setLoading(btn, true);
      try {
        const cred = await loginWithGoogle();
        if (cred?.user) await getUserData(cred.user);
        window.location.href = "dashboard.html";
      } catch (err) {
        showError(getFirebaseError(err));
        setLoading(btn, false);
      }
    });

    // Invitado
    document.getElementById("guestBtn").addEventListener("click", async () => {
      hideError();
      const btn = document.getElementById("guestBtn");
      setLoading(btn, true);
      try {
        await loginAsGuest();
        window.location.href = "dashboard.html";
      } catch (err) {
        showError(getFirebaseError(err));
        setLoading(btn, false);
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Control de Ventas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="mobile-header">
        <h1>📦 InvenPro</h1>
        <button id="menuToggle">☰</button>
      </header>
      <nav class="mobile-nav" id="mobileNav"></nav>

      <main class="page-content">
        <div class="max-w-container space-y">
          <h1>📈 Control de Ventas</h1>

          <!-- Stats -->
          <div class="stats-grid" id="statsGrid"></div>

          <!-- Gastos -->
          <div class="card glass">
            <div class="card-content" style="display:flex;align-items:center;gap:0.75rem;padding:1rem">
              <span style="font-size:1.25rem">📉</span>
              <div style="flex:1">
                <p style="font-size:0.875rem;font-weight:500;margin-bottom:0.25rem">Registrar gastos (Bs)</p>
                <input type="number" id="gastosInput" class="input" step="0.01" min="0" placeholder="0.00" style="max-width:16rem">
              </div>
            </div>
          </div>

          <!-- Table -->
          <div class="card glass">
            <div class="card-header"><h3>Historial de Ventas (<span id="salesCount">0</span>)</h3></div>
            <div class="card-content" style="padding:0" id="tableContainer">
              <div class="text-center" style="padding:3rem" id="loadingBox">
                <div class="spinner spinner-primary spinner-lg" style="margin:auto"></div>
              </div>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from "./js/auth.js";
    import { getSales } from "./js/ventas.js";
    import { showToast } from "./js/app.js";

    let sales = [];

    function updateStats() {
      const gastos = parseFloat(document.getElementById("gastosInput").value) || 0;
      const totalVendido = sales.reduce((s, v) => s + (v.precio || 0), 0);
      const balance = totalVendido - gastos;

      document.getElementById("statsGrid").innerHTML = [
        { label: "💰 Total Vendido", value: `Bs ${totalVendido.toFixed(2)}`, cls: "green" },
        { label: "📊 Total Ventas", value: sales.length, cls: "green" },
        { label: "📉 Gastos", value: `Bs ${gastos.toFixed(2)}`, cls: "red" },
        { label: "🧮 Balance", value: `Bs ${balance.toFixed(2)}`, cls: balance >= 0 ? "green" : "red" },
      ].map(s => `
        <div class="card glass stat-card">
          <p class="stat-label">${s.label}</p>
          <p class="stat-value ${s.cls}">${s.value}</p>
        </div>
      `).join("");
    }

    function renderTable() {
      document.getElementById("salesCount").textContent = sales.length;
      if (sales.length === 0) {
        document.getElementById("tableContainer").innerHTML = '<p class="text-center" style="padding:3rem;color:var(--muted-fg)">No hay ventas registradas</p>';
        return;
      }
      document.getElementById("tableContainer").innerHTML = `
        <div class="table-wrapper">
          <table>
            <thead>
              <tr><th>Producto</th><th>Código</th><th>Color</th><th>Precio</th><th>Vendedor</th><th>Fecha</th></tr>
            </thead>
            <tbody>
              ${sales.map(s => `
                <tr>
                  <td style="text-transform:capitalize;font-weight:500">${s.producto}</td>
                  <td>${s.codigo}</td>
                  <td>${s.color}</td>
                  <td style="font-weight:600;color:var(--primary)">Bs ${s.precio?.toFixed(2)}</td>
                  <td>${s.nombreUsuario}</td>
                  <td style="color:var(--muted-fg);font-size:0.75rem">${s.fecha?.toDate ? s.fecha.toDate().toLocaleString("es-BO") : "-"}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </div>`;
    }

    requireAuth(async (user, userData) => {
      if (userData.role !== "vendedor") {
        document.querySelector(".page-content").innerHTML = '<div class="text-center" style="padding:4rem"><h2>Acceso restringido</h2><p style="color:var(--muted-fg)">Solo los vendedores pueden ver el historial.</p></div>';
        return;
      }

      // Sidebar
      const items = [
        { label: "Dashboard", path: "dashboard.html", icon: "📊" },
        { label: "Subir Productos", path: "subir.html", icon: "📦" },
        { label: "Ventas", path: "ventas.html", icon: "🛒" },
        { label: "Control de Ventas", path: "historial.html", icon: "📈" },
        { label: "Mi Cuenta", path: "cuenta.html", icon: "👤" },
      ];
      document.getElementById("sidebar").innerHTML = `<div class="sidebar-header"><h1>📦 InvenPro</h1><p>Sistema de Inventario</p></div><nav class="sidebar-nav">${items.map(i=>`<button class="nav-btn ${i.path==='historial.html'?'active':''}" onclick="location.href='${i.path}'">${i.icon} ${i.label}</button>`).join("")}</nav><div class="sidebar-footer"><button class="nav-btn" style="color:var(--destructive)" id="logoutBtn">🚪 Cerrar sesión</button></div>`;
      document.getElementById("mobileNav").innerHTML = items.map(i=>`<button class="mobile-nav-btn ${i.path==='historial.html'?'active':''}" onclick="location.href='${i.path}'">${i.icon} ${i.label}</button>`).join("")+`<button class="mobile-nav-btn logout-btn" id="logoutBtnMobile">🚪 Cerrar sesión</button>`;
      document.getElementById("menuToggle")?.addEventListener("click",()=>document.getElementById("mobileNav").classList.toggle("open"));
      document.getElementById("logoutBtn")?.addEventListener("click",logout);
      document.getElementById("logoutBtnMobile")?.addEventListener("click",logout);

      try {
        sales = await getSales();
      } catch (e) { showToast("Error al cargar ventas", "error"); }

      document.getElementById("loadingBox")?.remove();
      updateStats();
      renderTable();
      document.getElementById("gastosInput").addEventListener("input", updateStats);
    });
  </script>
</body>
</html>

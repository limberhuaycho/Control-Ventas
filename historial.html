<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Control de Ventas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><h1>📦 InvenPro</h1><p>Sistema de Inventario</p></div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user"></div>
        <button class="btn btn-ghost btn-full" id="logout-btn" style="justify-content:flex-start;color:rgba(255,255,255,0.5)">🚪 Cerrar sesión</button>
      </div>
    </aside>
    <div class="main-content">
      <div class="mobile-header"><h1>📦 InvenPro</h1><button class="hamburger" id="hamburger">☰</button></div>
      <div class="mobile-nav" id="mobile-nav"></div>
      <div class="page-content">
        <div class="container-xl space-y">
          <h1 class="page-title">📈 Control de Ventas</h1>

          <!-- Stats -->
          <div class="stats-grid">
            <div class="card stat-card">
              <div class="stat-icon" style="color:var(--primary)">💰</div>
              <p class="stat-label">Total Vendido</p>
              <p class="stat-value positive" id="stat-total">Bs 0.00</p>
            </div>
            <div class="card stat-card">
              <div class="stat-icon" style="color:var(--accent-fg)">📊</div>
              <p class="stat-label">Total Ventas</p>
              <p class="stat-value" id="stat-count">0</p>
            </div>
            <div class="card stat-card">
              <div class="stat-icon" style="color:var(--destructive)">📉</div>
              <p class="stat-label">Gastos</p>
              <p class="stat-value negative" id="stat-gastos">Bs 0.00</p>
            </div>
            <div class="card stat-card">
              <div class="stat-icon" style="color:var(--primary)">🧮</div>
              <p class="stat-label">Balance</p>
              <p class="stat-value positive" id="stat-balance">Bs 0.00</p>
            </div>
          </div>

          <!-- Gastos input -->
          <div class="card">
            <div class="card-body" style="display:flex;align-items:center;gap:0.75rem">
              <span style="color:var(--destructive)">📉</span>
              <div style="flex:1">
                <p style="font-size:0.875rem;font-weight:500;margin-bottom:0.375rem">Registrar gastos (Bs)</p>
                <input type="number" step="0.01" min="0" placeholder="0.00" id="gastos-input" style="max-width:200px">
              </div>
            </div>
          </div>

          <!-- Sales table -->
          <div class="card">
            <div class="card-header">
              <h2>Historial de Ventas (<span id="sales-count">0</span>)</h2>
            </div>
            <div class="card-body" style="padding-top:0">
              <div class="table-wrapper">
                <table>
                  <thead>
                    <tr>
                      <th>Producto</th>
                      <th>Código</th>
                      <th>Color</th>
                      <th>Precio</th>
                      <th>Vendedor</th>
                      <th>Fecha</th>
                    </tr>
                  </thead>
                  <tbody id="sales-tbody">
                    <tr><td colspan="6"><div class="spinner"></div></td></tr>
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ventas.js"></script>
  <script>
    checkAuth((user, userData) => {
      if (!userData) return;
      setupSidebar(userData, "historial.html");
      if (userData.role !== "vendedor") {
        document.querySelector(".container-xl").innerHTML = `
          <div class="card"><div class="card-body text-center">
            <h2>Acceso restringido</h2>
            <p style="color:var(--muted-fg)">Solo los vendedores pueden ver el control de ventas.</p>
          </div></div>`;
        return;
      }
      initHistoryPage(userData);
    });
  </script>
</body>
</html>

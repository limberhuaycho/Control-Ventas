<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Subir Producto</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="mobile-header">
        <h1>📦 InvenPro</h1>
        <button id="menuToggle">☰</button>
      </header>
      <nav class="mobile-nav" id="mobileNav"></nav>

      <main class="page-content">
        <div class="max-w-sm space-y">
          <h1>📦 Subir Producto</h1>

          <div class="card glass">
            <div class="card-header"><h3>Nuevo Producto</h3></div>
            <div class="card-content">
              <form id="productForm" class="space-y-sm">
                <!-- Tipo -->
                <div class="form-group">
                  <label for="tipo">Tipo de producto *</label>
                  <select id="tipo" class="input select-input">
                    <option value="">Selecciona tipo</option>
                    <option value="tinta">Tinta</option>
                    <option value="tampo">Tampo</option>
                    <option value="sello">Sello</option>
                  </select>
                </div>

                <!-- Tipo de sello (solo sello) -->
                <div class="form-group hidden" id="selloTypeGroup">
                  <label for="tipoSello">Tipo de sello *</label>
                  <select id="tipoSello" class="input select-input">
                    <option value="">Selecciona tipo de sello</option>
                    <option value="automatico">Automático</option>
                    <option value="redondo">Redondo</option>
                    <option value="ovalo">Óvalo</option>
                    <option value="cuadrado">Cuadrado</option>
                    <option value="rectangulo">Rectángulo</option>
                    <option value="triangulo">Triángulo</option>
                    <option value="lineal">Lineal</option>
                  </select>
                </div>

                <!-- Campos comunes (ocultos hasta seleccionar tipo) -->
                <div id="commonFields" class="hidden">
                  <div class="grid-2">
                    <div class="form-group">
                      <label for="color">Color *</label>
                      <input type="text" id="color" class="input" placeholder="Ej: Azul" maxlength="50">
                    </div>
                    <div class="form-group">
                      <label for="marca">Marca *</label>
                      <input type="text" id="marca" class="input" placeholder="Ej: Trodat" maxlength="100">
                    </div>
                    <div class="form-group">
                      <label for="codigo">Código *</label>
                      <input type="text" id="codigo" class="input" placeholder="Ej: TR-001" maxlength="50">
                    </div>
                    <div class="form-group">
                      <label for="precio">Precio (Bs) *</label>
                      <input type="number" id="precio" class="input" step="0.01" min="0" placeholder="0.00">
                    </div>
                  </div>

                  <!-- Tampo extras -->
                  <div id="tampoFields" class="hidden">
                    <div class="grid-2">
                      <div class="form-group">
                        <label for="tamano">Tamaño *</label>
                        <input type="text" id="tamano" class="input" placeholder="Ej: Grande" maxlength="50">
                      </div>
                      <div class="form-group">
                        <label for="cantidadTampo">Cantidad *</label>
                        <input type="number" id="cantidadTampo" class="input" min="1" placeholder="1">
                      </div>
                    </div>
                  </div>

                  <!-- Sello extras -->
                  <div id="selloFields" class="hidden">
                    <div class="grid-2">
                      <div class="form-group">
                        <label for="medida">Medida *</label>
                        <input type="text" id="medida" class="input" placeholder="Ej: 40x60mm" maxlength="50">
                      </div>
                      <div class="form-group">
                        <label for="colorTampo">Color del tampo *</label>
                        <input type="text" id="colorTampo" class="input" placeholder="Ej: Rojo" maxlength="50">
                      </div>
                      <div class="form-group">
                        <label for="cantidadSello">Cantidad *</label>
                        <input type="number" id="cantidadSello" class="input" min="1" placeholder="1">
                      </div>
                    </div>
                  </div>

                  <button type="submit" class="btn btn-primary btn-block" id="saveBtn">
                    💾 Guardar Producto
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from "./js/auth.js";
    import { saveProduct } from "./js/productos.js";
    import { showToast } from "./js/app.js";

    let currentUser = null;

    requireAuth((user, userData) => {
      currentUser = user;
      // Solo vendedores
      if (userData.role !== "vendedor") {
        document.querySelector(".page-content").innerHTML = '<div class="text-center" style="padding:4rem"><h2>Acceso restringido</h2><p style="color:var(--muted-fg)">Solo los vendedores pueden subir productos.</p></div>';
        return;
      }

      // Build sidebar (import from dashboard)
      const script = document.createElement("script");
      script.type = "module";
      script.textContent = `
        import { requireAuth, logout } from "./js/auth.js";
        const isVendedor = true;
        const items = [
          { label: "Dashboard", path: "dashboard.html", icon: "📊", show: true },
          { label: "Subir Productos", path: "subir.html", icon: "📦", show: true },
          { label: "Ventas", path: "ventas.html", icon: "🛒", show: true },
          { label: "Control de Ventas", path: "historial.html", icon: "📈", show: true },
          { label: "Mi Cuenta", path: "cuenta.html", icon: "👤", show: true },
        ];
        const sidebar = document.getElementById("sidebar");
        sidebar.innerHTML = '<div class="sidebar-header"><h1>📦 InvenPro</h1><p>Sistema de Inventario</p></div><nav class="sidebar-nav">' +
          items.map(i => '<button class="nav-btn ' + (i.path === "subir.html" ? "active" : "") + '" onclick="location.href=\\''+i.path+'\\'">' + i.icon + ' ' + i.label + '</button>').join("") +
          '</nav><div class="sidebar-footer"><button class="nav-btn" style="color:var(--destructive)" id="logoutBtn">🚪 Cerrar sesión</button></div>';
        document.getElementById("logoutBtn")?.addEventListener("click", () => { import("./js/auth.js").then(m => m.logout()); });
        const mobileNav = document.getElementById("mobileNav");
        mobileNav.innerHTML = items.map(i => '<button class="mobile-nav-btn ' + (i.path === "subir.html" ? "active" : "") + '" onclick="location.href=\\''+i.path+'\\'">' + i.icon + ' ' + i.label + '</button>').join("") +
          '<button class="mobile-nav-btn logout-btn" id="logoutBtnMobile">🚪 Cerrar sesión</button>';
        document.getElementById("menuToggle")?.addEventListener("click", () => mobileNav.classList.toggle("open"));
        document.getElementById("logoutBtnMobile")?.addEventListener("click", () => { import("./js/auth.js").then(m => m.logout()); });
      `;
      document.body.appendChild(script);
    });

    // Show/hide dynamic fields
    const tipo = document.getElementById("tipo");
    tipo.addEventListener("change", () => {
      const v = tipo.value;
      document.getElementById("commonFields").classList.toggle("hidden", !v);
      document.getElementById("selloTypeGroup").classList.toggle("hidden", v !== "sello");
      document.getElementById("tampoFields").classList.toggle("hidden", v !== "tampo");
      document.getElementById("selloFields").classList.toggle("hidden", v !== "sello");
    });

    // Submit
    document.getElementById("productForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const t = tipo.value;
      if (!t) { showToast("Selecciona un tipo de producto", "error"); return; }

      const color = document.getElementById("color").value.trim();
      const marca = document.getElementById("marca").value.trim();
      const codigo = document.getElementById("codigo").value.trim();
      const precio = parseFloat(document.getElementById("precio").value);

      if (!color || !marca || !codigo || isNaN(precio) || precio <= 0) {
        showToast("Completa todos los campos requeridos", "error"); return;
      }

      const data = { tipo: t, color, marca, codigo, precio };

      if (t === "tampo") {
        const tamano = document.getElementById("tamano").value.trim();
        const cantidad = parseInt(document.getElementById("cantidadTampo").value);
        if (!tamano || isNaN(cantidad)) { showToast("Completa tamaño y cantidad", "error"); return; }
        data.tamano = tamano;
        data.cantidad = cantidad;
      }

      if (t === "sello") {
        const tipoSello = document.getElementById("tipoSello").value;
        const medida = document.getElementById("medida").value.trim();
        const colorTampo = document.getElementById("colorTampo").value.trim();
        const cantidad = parseInt(document.getElementById("cantidadSello").value);
        if (!tipoSello || !medida || !colorTampo || isNaN(cantidad)) { showToast("Completa todos los campos del sello", "error"); return; }
        data.tipoSello = tipoSello;
        data.medida = medida;
        data.colorTampo = colorTampo;
        data.cantidad = cantidad;
      }

      if (t === "tinta") data.cantidad = 1;

      const btn = document.getElementById("saveBtn");
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner"></div>';

      try {
        await saveProduct(data, currentUser.uid);
        showToast("Producto guardado correctamente");
        document.getElementById("productForm").reset();
        document.getElementById("commonFields").classList.add("hidden");
        document.getElementById("selloTypeGroup").classList.add("hidden");
        document.getElementById("tampoFields").classList.add("hidden");
        document.getElementById("selloFields").classList.add("hidden");
      } catch (err) {
        showToast("Error al guardar: " + (err?.message || ""), "error");
      }
      btn.disabled = false;
      btn.innerHTML = "💾 Guardar Producto";
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Subir Productos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><h1>📦 InvenPro</h1><p>Sistema de Inventario</p></div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user"></div>
        <button class="btn btn-ghost btn-full" id="logout-btn" style="justify-content:flex-start;color:rgba(255,255,255,0.5)">🚪 Cerrar sesión</button>
      </div>
    </aside>
    <div class="main-content">
      <div class="mobile-header"><h1>📦 InvenPro</h1><button class="hamburger" id="hamburger">☰</button></div>
      <div class="mobile-nav" id="mobile-nav"></div>
      <div class="page-content">
        <div class="container-md space-y">
          <h1 class="page-title">📦 Subir Producto</h1>
          <div class="card">
            <div class="card-header"><h2>Nuevo Producto</h2></div>
            <div class="card-body">
              <form id="upload-form">
                <div class="form-group">
                  <label>Tipo de producto *</label>
                  <select id="product-type" required>
                    <option value="">Selecciona tipo</option>
                    <option value="tinta">Tinta</option>
                    <option value="tampo">Tampo</option>
                    <option value="sello">Sello</option>
                  </select>
                </div>
                <div id="dynamic-fields"></div>
              </form>
            </div>
          </div>
          <div id="access-denied" class="card hidden">
            <div class="card-body text-center">
              <h2>Acceso restringido</h2>
              <p style="color:var(--muted-fg)">Solo los vendedores pueden subir productos.</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/productos.js"></script>
  <script>
    checkAuth((user, userData) => {
      if (!userData) return;
      setupSidebar(userData, "subir.html");
      if (userData.role !== "vendedor") {
        document.getElementById("upload-form").closest(".card").classList.add("hidden");
        document.getElementById("access-denied").classList.remove("hidden");
        return;
      }
      initUploadPage(userData);
    });
  </script>
</body>
</html>

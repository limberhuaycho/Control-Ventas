<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>EarnFlow - Panel de Administración</title>
    <link rel="stylesheet" href="admin.css" />
  </head>
  <body>
    <div class="loading-overlay" id="loadingOverlay">
      <div class="spinner"></div>
    </div>

    <!-- LOGIN SCREEN -->
    <div class="admin-login-screen" id="adminLoginScreen" style="display: none">
      <div class="admin-login-card">
        <div class="admin-login-logo">
          <svg
            viewBox="0 0 40 40"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            width="48"
            height="48"
          >
            <rect width="32" height="32" rx="10" fill="#3b82f6" />
            <path
              d="M12 28V12h8c2.2 0 4 .8 5 2s1.5 2.8 1.5 4.5c0 1.2-.3 2.3-.8 3.2-.6.9-1.3 1.6-2.3 2l3.6 4.3h-4l-3.2-4H15.5V28H12zm3.5-7h4.3c1 0 1.8-.3 2.4-.9.6-.6.8-1.4.8-2.4s-.3-1.7-.8-2.3c-.6-.5-1.4-.8-2.4-.8h-4.3v6.4z"
              fill="white"
            />
            <path d="M20 32l4-3h-8l4 3z" fill="white" opacity="0.6" />
          </svg>
          <span>EarnFlow Admin</span>
        </div>
        <p class="admin-login-subtitle">
          Inicia sesión con tu cuenta autorizada
        </p>
        <button
          class="btn-google-login"
          id="btnGoogleLogin"
          onclick="signInWithGoogle()"
        >
          <svg viewBox="0 0 48 48" width="20" height="20">
            <path
              fill="#EA4335"
              d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.9 2.4 30.3 0 24 0 14.6 0 6.6 5.4 2.7 13.3l7.8 6C12.4 13.2 17.7 9.5 24 9.5z"
            />
            <path
              fill="#4285F4"
              d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8C43.8 37.3 46.5 31.3 46.5 24.5z"
            />
            <path
              fill="#FBBC05"
              d="M10.5 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.8.9 7.4 2.5 10.6l8-5.9z"
            />
            <path
              fill="#34A853"
              d="M24 48c6.3 0 11.6-2.1 15.5-5.6l-7.5-5.8c-2.1 1.4-4.8 2.2-8 2.2-6.3 0-11.6-3.7-13.5-9l-8 5.9C6.6 42.6 14.6 48 24 48z"
            />
            <path fill="none" d="M0 0h48v48H0z" />
          </svg>
          Iniciar sesión con Google
        </button>
        <p
          class="admin-login-note"
          id="adminLoginError"
          style="
            display: none;
            color: #ef4444;
            margin-top: 16px;
            font-size: 14px;
            text-align: center;
          "
        ></p>
      </div>
    </div>

    <div class="admin-layout" id="adminLayout" style="display: none">
      <!-- ADMIN SIDEBAR -->
      <aside class="admin-sidebar" id="sidebar">
        <div class="sidebar-header">
          <svg
            viewBox="0 0 40 40"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <rect width="32" height="32" rx="10" fill="#3b82f6" />
            <path
              d="M12 28V12h8c2.2 0 4 .8 5 2s1.5 2.8 1.5 4.5c0 1.2-.3 2.3-.8 3.2-.6.9-1.3 1.6-2.3 2l3.6 4.3h-4l-3.2-4H15.5V28H12zm3.5-7h4.3c1 0 1.8-.3 2.4-.9.6-.6.8-1.4.8-2.4s-.3-1.7-.8-2.3c-.6-.5-1.4-.8-2.4-.8h-4.3v6.4z"
              fill="white"
            />
            <path d="M20 32l4-3h-8l4 3z" fill="white" opacity="0.6" />
          </svg>
          <span>EarnFlow</span>
          <span class="admin-badge">Admin</span>
        </div>
        <nav class="admin-nav">
          <div class="nav-label">General</div>
          <button
            class="nav-item active"
            onclick="showAdminSection('dashboard',this)"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="3" width="7" height="7" rx="1" />
              <rect x="14" y="3" width="7" height="7" rx="1" />
              <rect x="3" y="14" width="7" height="7" rx="1" />
              <rect x="14" y="14" width="7" height="7" rx="1" />
            </svg>
            Dashboard
          </button>
          <button class="nav-item" onclick="showAdminSection('usuarios',this)">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
              <circle cx="9" cy="7" r="4" />
              <path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75" />
            </svg>
            Usuarios
          </button>
          <div class="nav-label">Gestión</div>
          <button class="nav-item" onclick="showAdminSection('codigos',this)">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0110 0v4" />
            </svg>
            Códigos de Activación
          </button>
          <button class="nav-item" onclick="showAdminSection('planes',this)">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M12 2v20M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
            </svg>
            Planes y Precios
          </button>
          <button class="nav-item" onclick="showAdminSection('mensajes',this)">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"
              />
            </svg>
            Mensajes
          </button>
          <button class="nav-item" onclick="showAdminSection('config',this)">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z"
              />
            </svg>
            Configuración
          </button>
          <div class="nav-label">Sistema</div>
          <button class="nav-item" onclick="showAdminSection('errores',this)">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="10" />
              <line x1="12" y1="8" x2="12" y2="12" />
              <line x1="12" y1="16" x2="12.01" y2="16" />
            </svg>
            Errores y Reportes
          </button>
        </nav>
        <div class="sidebar-footer">
          <button
            class="nav-item"
            onclick="window.location.href='app.html'"
            style="color: rgba(255, 255, 255, 0.5)"
          >
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <polyline points="15 18 9 12 15 6" />
            </svg>
            Volver al Sistema
          </button>
          <button class="btn-logout" onclick="adminLogout()">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"
              />
            </svg>
            Cerrar Sesión
          </button>
        </div>
      </aside>

      <!-- ADMIN CONTENT -->
      <div class="admin-content">
        <div class="admin-topbar">
          <div class="flex items-center gap-2">
            <button class="mobile-toggle" onclick="toggleMobileSidebar()">
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <line x1="3" y1="12" x2="21" y2="12" />
                <line x1="3" y1="6" x2="21" y2="6" />
                <line x1="3" y1="18" x2="21" y2="18" />
              </svg>
            </button>
            <h1 id="adminTitle">Panel de Administración</h1>
          </div>
          <div class="topbar-date" id="currentDate"></div>
        </div>
        <div class="admin-area" id="adminArea">
          <!-- Sections loaded dynamically -->
        </div>
      </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="admin.js"></script>
  </body>
</html>

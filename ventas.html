<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Ventas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header"><h1>📦 InvenPro</h1><p>Sistema de Inventario</p></div>
      <nav class="sidebar-nav"></nav>
      <div class="sidebar-footer">
        <div class="sidebar-user"></div>
        <button class="btn btn-ghost btn-full" id="logout-btn" style="justify-content:flex-start;color:rgba(255,255,255,0.5)">🚪 Cerrar sesión</button>
      </div>
    </aside>
    <div class="main-content">
      <div class="mobile-header"><h1>📦 InvenPro</h1><button class="hamburger" id="hamburger">☰</button></div>
      <div class="mobile-nav" id="mobile-nav"></div>
      <div class="page-content">
        <div class="container-lg space-y">
          <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem">
            <h1 class="page-title" style="margin-bottom:0">🛒 Ventas</h1>
            <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.875rem">
              <span style="color:var(--muted-fg)">⏰</span>
              <span style="color:var(--muted-fg)" id="status-time"></span>
              <div class="status-dot" id="status-dot"></div>
            </div>
          </div>

          <div id="status-msg" class="card" style="display:none">
            <div class="card-body text-center" style="color:var(--muted-fg);font-size:0.875rem;padding:1rem"></div>
          </div>

          <div class="search-wrapper">
            <span class="search-icon">🔍</span>
            <input type="text" id="search-input" placeholder="Buscar producto..." maxlength="100">
          </div>

          <div class="products-grid" id="products-grid">
            <div class="spinner"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/ventas.js"></script>
  <script>
    checkAuth((user, userData) => {
      if (!userData) return;
      setupSidebar(userData, "ventas.html");
      initSalesPage(userData);
    });
  </script>
</body>
</html>

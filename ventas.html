<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>InvenPro - Ventas</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="main-area">
      <header class="mobile-header">
        <h1>📦 InvenPro</h1>
        <button id="menuToggle">☰</button>
      </header>
      <nav class="mobile-nav" id="mobileNav"></nav>

      <main class="page-content">
        <div class="max-w-container space-y">
          <div style="display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:1rem">
            <h1>🛒 Ventas</h1>
            <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.875rem">
              <span>🕐</span>
              <span style="color:var(--muted-fg)" id="timeDisplay"></span>
              <div class="status-dot" id="statusDot"></div>
            </div>
          </div>

          <div class="card glass hidden" id="offlineMsg">
            <div class="card-content text-center" style="color:var(--muted-fg);font-size:0.875rem">
              ⏰ <span id="statusText"></span>
            </div>
          </div>

          <!-- Search -->
          <div class="input-icon-wrapper">
            <span class="icon">🔍</span>
            <input type="text" id="searchInput" class="input" placeholder="Buscar producto..." maxlength="100">
          </div>

          <!-- Loading -->
          <div class="text-center" id="loadingBox" style="padding:3rem">
            <div class="spinner spinner-primary spinner-lg" style="margin:auto"></div>
          </div>

          <!-- Empty -->
          <p class="text-center hidden" id="emptyMsg" style="padding:3rem;color:var(--muted-fg)">No se encontraron productos</p>

          <!-- Products -->
          <div class="product-grid" id="productGrid"></div>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { requireAuth, logout } from "./js/auth.js";
    import { getProducts } from "./js/productos.js";
    import { registerSale } from "./js/ventas.js";
    import { showToast, getBoliviaTimeString, isWithinSalesHours, getSalesStatusMessage } from "./js/app.js";

    let products = [];
    let userData = null;
    let salesActive = isWithinSalesHours();

    function updateTime() {
      document.getElementById("timeDisplay").textContent = getBoliviaTimeString();
      salesActive = isWithinSalesHours();
      const dot = document.getElementById("statusDot");
      dot.className = salesActive ? "status-dot active" : "status-dot inactive";
      const offMsg = document.getElementById("offlineMsg");
      offMsg.classList.toggle("hidden", salesActive);
      document.getElementById("statusText").textContent = getSalesStatusMessage();
      renderProducts();
    }

    function renderProducts() {
      const search = document.getElementById("searchInput").value.toLowerCase();
      const filtered = products.filter(p =>
        [p.tipo, p.color, p.marca, p.codigo].some(v => v?.toLowerCase().includes(search))
      );

      document.getElementById("emptyMsg").classList.toggle("hidden", filtered.length > 0);
      const grid = document.getElementById("productGrid");
      const isVendedor = userData?.role === "vendedor";

      grid.innerHTML = filtered.map(p => `
        <div class="card glass" style="transition:all 0.2s">
          <div class="card-content" style="padding:1.25rem">
            <div class="product-card-top">
              <div>
                <span class="badge badge-secondary">${p.tipo}</span>
                ${p.tipoSello ? `<span class="badge badge-outline" style="margin-left:0.25rem">${p.tipoSello}</span>` : ""}
                <p style="font-weight:600;font-size:1.125rem;margin-top:0.5rem">${p.marca}</p>
                <p style="font-size:0.875rem;color:var(--muted-fg)">Código: ${p.codigo}</p>
              </div>
              <p class="product-price">Bs ${p.precio.toFixed(2)}</p>
            </div>
            <div class="product-meta">
              <span>Color: ${p.color}</span>
              ${p.tamano ? `<span>· Tamaño: ${p.tamano}</span>` : ""}
              ${p.medida ? `<span>· Medida: ${p.medida}</span>` : ""}
              ${p.cantidad ? `<span>· Cantidad: ${p.cantidad}</span>` : ""}
            </div>
            ${isVendedor ? `
              <button class="btn ${salesActive ? 'btn-primary' : 'btn-secondary'} btn-block sell-btn"
                data-id="${p.id}" ${!salesActive ? 'disabled' : ''}>
                ${salesActive ? '🟢 Vender' : '🔴 Fuera de horario'}
              </button>
            ` : ""}
          </div>
        </div>
      `).join("");

      // Sell buttons
      grid.querySelectorAll(".sell-btn").forEach(btn => {
        btn.addEventListener("click", async () => {
          const product = products.find(p => p.id === btn.dataset.id);
          if (!product || !salesActive) return;
          btn.disabled = true;
          btn.innerHTML = '<div class="spinner"></div>';
          try {
            await registerSale({
              productoId: product.id,
              producto: product.tipo,
              codigo: product.codigo,
              precio: product.precio,
              color: product.color,
              marca: product.marca,
              usuario: userData.uid,
              nombreUsuario: userData.displayName || "Desconocido",
            });
            showToast(`Venta registrada: ${product.codigo} - Bs ${product.precio}`);
          } catch (err) {
            showToast("Error al registrar venta", "error");
          }
          btn.disabled = false;
          btn.innerHTML = salesActive ? "🟢 Vender" : "🔴 Fuera de horario";
        });
      });
    }

    requireAuth(async (user, ud) => {
      userData = ud;

      // Sidebar
      const isVendedor = ud.role === "vendedor";
      const items = [
        { label: "Dashboard", path: "dashboard.html", icon: "📊", show: true },
        { label: "Subir Productos", path: "subir.html", icon: "📦", show: isVendedor },
        { label: "Ventas", path: "ventas.html", icon: "🛒", show: true },
        { label: "Control de Ventas", path: "historial.html", icon: "📈", show: isVendedor },
        { label: "Mi Cuenta", path: "cuenta.html", icon: "👤", show: true },
      ];
      document.getElementById("sidebar").innerHTML = `
        <div class="sidebar-header"><h1>📦 InvenPro</h1><p>Sistema de Inventario</p></div>
        <nav class="sidebar-nav">${items.filter(i=>i.show).map(i=>`<button class="nav-btn ${i.path==='ventas.html'?'active':''}" onclick="location.href='${i.path}'">${i.icon} ${i.label}</button>`).join("")}</nav>
        <div class="sidebar-footer"><button class="nav-btn" style="color:var(--destructive)" id="logoutBtn">🚪 Cerrar sesión</button></div>`;
      document.getElementById("mobileNav").innerHTML = items.filter(i=>i.show).map(i=>`<button class="mobile-nav-btn ${i.path==='ventas.html'?'active':''}" onclick="location.href='${i.path}'">${i.icon} ${i.label}</button>`).join("")+`<button class="mobile-nav-btn logout-btn" id="logoutBtnMobile">🚪 Cerrar sesión</button>`;
      document.getElementById("menuToggle")?.addEventListener("click",()=>document.getElementById("mobileNav").classList.toggle("open"));
      document.getElementById("logoutBtn")?.addEventListener("click",logout);
      document.getElementById("logoutBtnMobile")?.addEventListener("click",logout);

      // Load products
      try {
        products = await getProducts();
      } catch (e) { showToast("Error al cargar productos", "error"); }
      document.getElementById("loadingBox").classList.add("hidden");
      updateTime();
      setInterval(updateTime, 30000);
      document.getElementById("searchInput").addEventListener("input", renderProducts);
    });
  </script>
</body>
</html>
